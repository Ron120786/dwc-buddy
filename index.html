<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DWC Buddy</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }
    .card {
      background: #222;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      width: 100%;
      font-size: 16px;
    }
    button {
      background: #2ecc71;
      border: none;
      color: white;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🌱 DWC Buddy</h1>

<div class="card">
  <h3>EC waarde</h3>
  <input type="number" id="ec" step="0.1" value="1.0">
</div>

<div class="card">
  <h3>pH waarde</h3>
  <input type="number" id="ph" step="0.1" value="6.0">
</div>

<div class="card">
  <h3>Water wissel</h3>
  <button onclick="resetWater()">Water gewisseld</button>
  <p id="days"></p>
</div>

<script>
let lastChange = Date.now();

function resetWater() {
  lastChange = Date.now();
  updateDays();
}

function updateDays() {
  let days = Math.floor((Date.now() - lastChange) / (1000*60*60*24));
  document.getElementById("days").innerText =
    "Laatste waterwissel: " + days + " dagen geleden";
}

setInterval(updateDays, 1000);
updateDays();
</script>

</body>
</html>
