<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWC Buddy Pro v2</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 16px;
}

h1 { margin-bottom: 5px; }

.card {
  background: #1f1f1f;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  background: #2ecc71;
  color: white;
  font-weight: bold;
}

.bad { color: #ff5c5c; }
.good { color: #2ecc71; }

.small { font-size: 12px; opacity: 0.7; }

canvas {
  width: 100%;
  background: #111;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>🌱 DWC Buddy PRO v2</h1>

<div class="card">
  <h3>Plant naam</h3>
  <input id="plant" placeholder="Bijv. Scorpion / Madame Jeanette">
</div>

<div class="card">
  <h3>EC</h3>
  <input type="number" id="ec" step="0.1">
</div>

<div class="card">
  <h3>pH</h3>
  <input type="number" id="ph" step="0.1">
</div>

<div class="card">
  <button onclick="save()">💾 Opslaan meting</button>
</div>

<div class="card">
  <h3>🚰 Waterwissel</h3>
  <button onclick="waterChange()">Water gewisseld</button>
  <p id="waterInfo"></p>
</div>

<div class="card">
  <h3>⚠ Status</h3>
  <p id="status"></p>
</div>

<div class="card">
  <h3>📊 EC Trend</h3>
  <canvas id="chart" height="120"></canvas>
</div>

<div class="card">
  <h3>📒 Log</h3>
  <div id="log"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("dwc_pro")) || {
  plant: "",
  lastWater: Date.now(),
  log: []
};

function save() {

  let ec = parseFloat(document.getElementById("ec").value);
  let ph = parseFloat(document.getElementById("ph").value);
  let plant = document.getElementById("plant").value;

  data.plant = plant;

  data.log.push({
    ec,
    ph,
    t: Date.now()
  });

  if (data.log.length > 15) data.log.shift();

  localStorage.setItem("dwc_pro", JSON.stringify(data));

  update();
}

function waterChange() {
  data.lastWater = Date.now();
  localStorage.setItem("dwc_pro", JSON.stringify(data));
  update();
}

function update() {

  document.getElementById("plant").value = data.plant || "";

  let days = Math.floor((Date.now() - data.lastWater) / (1000*60*60*24));
  document.getElementById("waterInfo").innerText =
    "Laatste wissel: " + days + " dagen geleden";

  // status
  let last = data.log[data.log.length - 1];

  if (!last) {
    document.getElementById("status").innerText = "Nog geen data";
    return;
  }

  let msg = "";
  if (last.ec < 0.6) msg = "⚠ EC te laag";
  else if (last.ec > 2.2) msg = "⚠ EC te hoog";
  else msg = "✔ EC goed";

  document.getElementById("status").className =
    (last.ec < 0.6 || last.ec > 2.2) ? "bad" : "good";

  document.getElementById("status").innerText = msg;

  // log
  let html = "";
  data.log.slice().reverse().forEach(x => {
    html += `<div class="small">
      EC: ${x.ec} | pH: ${x.ph} | ${new Date(x.t).toLocaleString()}
    </div>`;
  });

  document.getElementById("log").innerHTML = html;

  drawChart();
}

function drawChart() {

  let c = document.getElementById("chart");
  let ctx = c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let points = data.log.map(x => x.ec);
  if (points.length < 2) return;

  let max = Math.max(...points);
  let min = Math.min(...points);

  ctx.strokeStyle = "#2ecc71";
  ctx.beginPath();

  points.forEach((p,i) => {
    let x = i * (c.width / points.length);
    let y = c.height - ((p - min) / (max - min + 0.01)) * c.height;

    if (i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

update();

</script>

</body>
</html>
