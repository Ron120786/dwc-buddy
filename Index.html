<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWC Smart AI v4</title>

<style>
body {
  font-family: Arial;
  background: #070707;
  color: white;
  padding: 16px;
}

h1 { margin-bottom: 6px; }

.card {
  background: #1a1a1a;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  font-size: 15px;
}

button {
  background: #2ecc71;
  color: white;
  font-weight: bold;
}

.bad { color: #ff4d4d; }
.good { color: #2ecc71; }
.warn { color: #f1c40f; }

.small { font-size: 12px; opacity: 0.75; line-height: 1.4; }
</style>
</head>

<body>

<h1>🌱 DWC Smart AI v4</h1>

<div class="card">
  <h3>➕ Plant</h3>
  <input id="name" placeholder="Plant naam">
  <select id="stage">
    <option value="seedling">Seedling</option>
    <option value="veg">Vegetative</option>
    <option value="flower">Flower</option>
  </select>
  <button onclick="addPlant()">Toevoegen</button>
</div>

<div class="card">
  <h3>🌿 Selecteer plant</h3>
  <select id="plantSelect" onchange="render()"></select>
</div>

<div class="card">
  <h3>📊 Meting</h3>
  <input type="number" id="ec" step="0.1" placeholder="EC">
  <input type="number" id="ph" step="0.1" placeholder="pH">
  <button onclick="saveReading()">Opslaan</button>
</div>

<div class="card">
  <h3>🚰 Water</h3>
  <button onclick="waterChange()">Water gewisseld</button>
  <p id="waterInfo"></p>
</div>

<div class="card">
  <h3>🧠 AI Analyse</h3>
  <p id="ai"></p>
</div>

<div class="card">
  <h3>⚠ Status</h3>
  <p id="status"></p>
</div>

<div class="card">
  <h3>📒 Log</h3>
  <div id="log"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("dwc_v4_ai")) || {
  plants: [],
  selected: 0
};

function save() {
  localStorage.setItem("dwc_v4_ai", JSON.stringify(data));
}

function addPlant() {
  let name = document.getElementById("name").value;
  let stage = document.getElementById("stage").value;

  if (!name) return;

  data.plants.push({
    name,
    stage,
    lastWater: Date.now(),
    log: []
  });

  data.selected = data.plants.length - 1;
  save();
  render();
}

function saveReading() {

  let p = data.plants[data.selected];
  if (!p) return;

  p.log.push({
    ec: parseFloat(document.getElementById("ec").value),
    ph: parseFloat(document.getElementById("ph").value),
    t: Date.now()
  });

  if (p.log.length > 25) p.log.shift();

  save();
  render();
}

function waterChange() {
  let p = data.plants[data.selected];
  if (!p) return;

  p.lastWater = Date.now();
  save();
  render();
}

function getRange(stage) {
  if (stage === "seedling") return {min:0.4,max:1.0};
  if (stage === "veg") return {min:1.0,max:1.8};
  if (stage === "flower") return {min:1.6,max:2.4};
}

function aiAnalysis(p, last) {

  let r = getRange(p.stage);
  let issues = [];

  if (last.ec < r.min) issues.push("EC te laag → voeding tekort mogelijk");
  if (last.ec > r.max) issues.push("EC te hoog → kans op stress/brand");
  if (last.ph < 5.5) issues.push("pH te laag → opname problemen");
  if (last.ph > 6.5) issues.push("pH te hoog → voeding blokkade");

  if (issues.length === 0) {
    return "✔ Alles stabiel. Groei lijkt gezond.";
  }

  return "⚠ " + issues.join(" | ");
}

function render() {

  let sel = document.getElementById("plantSelect");
  sel.innerHTML = "";

  data.plants.forEach((p,i)=>{
    sel.innerHTML += `<option value="${i}">${p.name} (${p.stage})</option>`;
  });

  sel.value = data.selected;
  data.selected = parseInt(sel.value);

  let p = data.plants[data.selected];
  if (!p) return;

  let last = p.log[p.log.length - 1];

  let days = Math.floor((Date.now() - p.lastWater)/(1000*60*60*24));
  document.getElementById("waterInfo").innerText =
    "Laatste waterwissel: " + days + " dagen geleden";

  if (!last) {
    document.getElementById("status").innerText = "Nog geen metingen";
    document.getElementById("ai").innerText = "AI wacht op data...";
    return;
  }

  let r = getRange(p.stage);

  let status = "";
  if (last.ec < r.min || last.ec > r.max) status = "bad";
  else status = "good";

  document.getElementById("status").className = status;
  document.getElementById("status").innerText =
    status === "good" ? "✔ OK" : "⚠ Afwijking";

  document.getElementById("ai").innerText = aiAnalysis(p,last);

  let html = "";
  p.log.slice().reverse().forEach(x=>{
    html += `<div class="small">
      EC:${x.ec} | pH:${x.ph} | ${new Date(x.t).toLocaleString()}
    </div>`;
  });

  document.getElementById("log").innerHTML = html;

  save();
}

render();

</script>

</body>
</html>
