<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWC Buddy Pro</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input, button {
  padding: 10px;
  width: 100%;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #2ecc71;
  color: white;
  font-weight: bold;
}

.bad {
  color: #ff4d4d;
}

.good {
  color: #2ecc71;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>

<body>

<h1>🌱 DWC Buddy PRO</h1>

<div class="card">
  <h3>EC waarde</h3>
  <input type="number" id="ec" step="0.1">
  <button onclick="save()">Opslaan EC</button>
  <p id="ecStatus"></p>
</div>

<div class="card">
  <h3>pH waarde</h3>
  <input type="number" id="ph" step="0.1">
  <button onclick="save()">Opslaan pH</button>
</div>

<div class="card">
  <h3>Water wissel</h3>
  <button onclick="resetWater()">Water gewisseld</button>
  <p id="days"></p>
</div>

<div class="card">
  <h3>📊 Laatste metingen</h3>
  <div id="history"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("dwc")) || {
  ec: 1.0,
  ph: 6.0,
  lastWater: Date.now(),
  history: []
};

function save() {
  let ec = parseFloat(document.getElementById("ec").value);
  let ph = parseFloat(document.getElementById("ph").value);

  data.ec = ec;
  data.ph = ph;

  data.history.push({
    ec: ec,
    ph: ph,
    time: new Date().toLocaleString()
  });

  if (data.history.length > 10) data.history.shift();

  localStorage.setItem("dwc", JSON.stringify(data));

  update();
}

function resetWater() {
  data.lastWater = Date.now();
  localStorage.setItem("dwc", JSON.stringify(data));
  update();
}

function update() {

  document.getElementById("ec").value = data.ec;
  document.getElementById("ph").value = data.ph;

  let days = Math.floor((Date.now() - data.lastWater) / (1000*60*60*24));
  document.getElementById("days").innerText =
    "Laatste waterwissel: " + days + " dagen geleden";

  let status = "";
  if (data.ec < 0.6) status = "⚠ EC te laag";
  else if (data.ec > 2.2) status = "⚠ EC te hoog";
  else status = "✔ EC ok";

  document.getElementById("ecStatus").innerText = status;
  document.getElementById("ecStatus").className =
    data.ec < 0.6 || data.ec > 2.2 ? "bad" : "good";

  let html = "";
  data.history.slice().reverse().forEach(h => {
    html += `<div class="small">EC: ${h.ec} | pH: ${h.ph} | ${h.time}</div>`;
  });

  document.getElementById("history").innerHTML = html;
}

update();

</script>

</body>
</html>
